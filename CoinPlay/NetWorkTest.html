<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Game Jam - Coinflip Sync Final</title>
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #1a1a1a;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #networkPanel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            color: white;
            font-family: 'Consolas', monospace;
            border-radius: 6px;
            z-index: 1000;
            border: 2px solid gold;
            width: 290px;
        }

        .net-title {
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 90%;
            padding: 6px;
            margin: 6px 0;
            border: 1px solid #555;
            border-radius: 4px;
            background: #222;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            background: #555;
            color: white;
        }

        .btn-host {
            background: #28a745 !important;
            color: white;
        }

        .btn-join {
            background: #007bff !important;
            color: white;
        }

        button:disabled {
            background: #444 !important;
            color: #888 !important;
            cursor: not-allowed;
        }
    </style>

    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

    <div id="networkPanel">
        <div class="net-title">⚡ 策略金币联机实装面板</div>
        <input type="text" id="roomCodeInput" maxlength="4" value="8888" placeholder="输入 4 位数字房间号">
        <div class="btn-group">
            <button id="hostBtn" class="btn-host">创房 (P1)</button>
            <button id="joinBtn" class="btn-join">加入 (P2)</button>
        </div>
        <div id="netStatus"
            style="font-size: 12px; margin-top: 10px; color: #aaa; background: rgba(255,255,255,0.1); padding: 5px; max-height: 200px; overflow-y: auto;">
            状态: 等待网络加入...</div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        // 全局崩溃接管
        window.onerror = function (message, source, lineno, colno, error) {
            const errDiv = document.getElementById("netStatus");
            if (errDiv) errDiv.innerHTML += `<div style="color:red;">🚨 脚本崩溃: ${message} (第${lineno}行)</div>`;
            return false;
        };

        const canvas = document.getElementById("renderCanvas");
        let engine, scene;
        let conn = null, peer = null;
        let myRole = "SPECTATOR"; // HOST 或 CLIENT
        let currentRoomCode = "8888";

        // === 1. 游戏状态机 ===
        const gameState = {
            phase: "WAITING_PLAYER",
            p1Score: 0,
            p2Score: 0,
            currentPlayer: null,
            activeCoin: null,
            hitList: new Set(),
            coinsFallen: [],
            isStable: true
        };

        let allCoins = [];
        let localPlayerText, remoteOpponentText, infoText, adt;
        let goldMat, table;
        let havokInstance = null;

        const screenLog = (msg, color = "white") => {
            console.log(`[GameLog] ${msg}`);
            const debugDiv = document.getElementById("netStatus");
            if (debugDiv) {
                debugDiv.innerHTML += `<div style="color:${color}; margin-top:2px;">• ${msg}</div>`;
                debugDiv.scrollTop = debugDiv.scrollHeight;
            }
        };

        screenLog("Protocol Check: Local Server HTTP OK ✅", "green");

        // ==========================================
        // ⚡ P2P 网络事件绑定与状态强锁
        // ==========================================
        function startHost(code) {
            myRole = "HOST";
            currentRoomCode = code;
            disableNetButtons();
            const uniqueId = `jam-room-${code}-HOST`;
            screenLog(`向服务器注册主机 [ID: ${code}]...`, "cyan");

            peer = new Peer(uniqueId);
            peer.on('open', (id) => {
                screenLog("房间号 [ " + code + " ] 创房成功！等待 P2P 握手...", "green");
                updateUI(); // 提前刷新显示本端初始身份
            });
            peer.on('connection', (incoming) => {
                conn = incoming;
                setupNetworkPipe();
            });
            peer.on('error', (err) => {
                screenLog("网络异常 (" + err.type + ")", "orange");
                enableNetButtons();
                if (err.type === 'unavailable-id') {
                    screenLog("提示: 房间号 " + code + " 被占用，请更换其他4位数字创房！", "yellow");
                }
            });
        }

        document.getElementById("hostBtn").addEventListener("click", () => {
            const code = document.getElementById("roomCodeInput").value.trim();
            if (!/^\d{4}$/.test(code)) return alert("请输入4位数字！");
            startHost(code);
        });

        document.getElementById("joinBtn").addEventListener("click", () => {
            const code = document.getElementById("roomCodeInput").value.trim();
            if (!/^\d{4}$/.test(code)) return alert("请输入4位数字！");

            myRole = "CLIENT";
            currentRoomCode = code;
            disableNetButtons();
            screenLog("正在寻找主机房间 [Room: " + code + "]...", "cyan");

            peer = new Peer("jam-room-" + code + "-CLIENT-" + Math.floor(Math.random() * 1000));
            peer.on('open', () => {
                conn = peer.connect("jam-room-" + code + "-HOST");
                setupNetworkPipe();
                updateUI(); // 提前刷新显示本端初始身份
            });
            peer.on('error', (err) => {
                screenLog("连接失败: " + err.type + "。请确认主机已创房。", "red");
                enableNetButtons();
            });
        });

        function disableNetButtons() {
            document.getElementById("hostBtn").disabled = true;
            document.getElementById("joinBtn").disabled = true;
            document.getElementById("roomCodeInput").disabled = true;
        }
        function enableNetButtons() {
            document.getElementById("hostBtn").disabled = false;
            document.getElementById("joinBtn").disabled = false;
            document.getElementById("roomCodeInput").disabled = false;
        }

        function setupNetworkPipe() {
            if (!conn) return;
            conn.on('open', () => {
                screenLog("🟢 P2P 联机成功！当前身份: " + myRole, "green");
                document.getElementById("networkPanel").style.backgroundColor = "rgba(0,40,0,0.9)";

                if (myRole === "HOST") {
                    screenLog("正在抛硬币随机决定开局玩家...", "yellow");
                    setTimeout(tossCoin, 1500);
                }
            });

            conn.on('data', (data) => {
                if (data.type === "toss_result") {
                    gameState.currentPlayer = data.starter;
                    infoText.text = data.msg;
                    infoText.alpha = 1;
                    setTimeout(() => {
                        infoText.alpha = 0;
                        gameState.phase = (gameState.currentPlayer === "P1") ? "P1_TURN" : "P2_TURN";
                        updateUI();
                    }, 2000);
                }

                if (data.type === "flip_coin") {
                    const targetCoin = allCoins.find(c => c.name === data.coinName);
                    if (targetCoin) {
                        gameState.activeCoin = targetCoin;
                        gameState.phase = "ANIMATING";
                        const impulseForce = new BABYLON.Vector3(data.force.x, data.force.y, data.force.z);
                        targetCoin.aggregate.body.applyImpulse(impulseForce, targetCoin.mesh.position);
                        screenLog("同步监听到对方弹射硬币: " + data.coinName);
                    }
                }

                if (data.type === "pos_sync" && myRole === "CLIENT") {
                    data.coins.forEach(syncData => {
                        const localCoin = allCoins.find(c => c.name === syncData.name);
                        if (localCoin && localCoin.aggregate) {
                            localCoin.mesh.position.set(syncData.pos.x, syncData.pos.y, syncData.pos.z);
                            localCoin.aggregate.body.setLinearVelocity(new BABYLON.Vector3(syncData.vel.x, syncData.vel.y, syncData.vel.z));
                        }
                    });
                }

                if (data.type === "turn_settle") {
                    gameState.p1Score = data.p1Score;
                    gameState.p2Score = data.p2Score;
                    infoText.text = data.infoText;
                    infoText.alpha = 1;
                    updateUI();
                }

                if (data.type === "turn_next") {
                    infoText.alpha = 0;
                    gameState.currentPlayer = data.nextPlayer;
                    gameState.phase = data.nextPhase;
                    gameState.hitList.clear();
                    gameState.coinsFallen = [];
                    gameState.activeCoin = null;
                    updateUI();
                }

                if (data.type === "spawn_coin") {
                    createCoin(data.name, data.x, data.z);
                }
            });

            conn.on('close', () => {
                screenLog("❌ 对方已断开连接", "red");
                enableNetButtons();
            });
        }

        // ==========================================
        // 🎮 3D 场景与核心逻辑实装
        // ==========================================
        async function initGame() {
            try {
                engine = new BABYLON.Engine(canvas, true);
                scene = new BABYLON.Scene(engine);

                const hk = new BABYLON.HavokPlugin(true, havokInstance);
                scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), hk);
                screenLog("Havok 物理高精约束引擎启动成功 ✅", "green");

                const hdrTexture = BABYLON.CubeTexture.CreateFromPrefilteredData("https://assets.babylonjs.com/environments/environmentSpecular.env", scene);
                scene.environmentTexture = hdrTexture;

                const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 15, BABYLON.Vector3.Zero(), scene);
                camera.attachControl(canvas, true);
                const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
                light.intensity = 0.8;

                // === 2. UI 系统 ===
                adt = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");
                localPlayerText = new BABYLON.GUI.TextBlock();
                remoteOpponentText = new BABYLON.GUI.TextBlock();
                infoText = new BABYLON.GUI.TextBlock();

                const setupUI = () => {
                    // 右下角：永远挂载并刷新自己本机的信息
                    localPlayerText.color = "white"; localPlayerText.fontSize = 28;
                    localPlayerText.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_RIGHT;
                    localPlayerText.textVerticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_BOTTOM;
                    localPlayerText.paddingRight = "20px"; localPlayerText.paddingBottom = "20px";
                    adt.addControl(localPlayerText);

                    // 左上角：永远挂载并刷新对手的信息
                    remoteOpponentText.color = "white"; remoteOpponentText.fontSize = 28;
                    remoteOpponentText.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
                    remoteOpponentText.textVerticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
                    remoteOpponentText.paddingLeft = "20px"; remoteOpponentText.paddingTop = "20px";
                    adt.addControl(remoteOpponentText);

                    infoText.text = "等待建立 P2P 联机..."; infoText.color = "gold"; infoText.fontSize = 35;
                    adt.addControl(infoText);
                };
                setupUI();
                updateUI(); // 初始化初显布局

                // === 3. 材质与场景物体 ===
                goldMat = new BABYLON.PBRMaterial("goldMat", scene);
                goldMat.metallic = 1.0; goldMat.roughness = 0.1;
                goldMat.albedoColor = new BABYLON.Color3(1, 0.8, 0.2);

                const tableMat = new BABYLON.StandardMaterial("tableMat", scene);
                tableMat.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);

                table = BABYLON.MeshBuilder.CreateCylinder("table", { diameter: 10, height: 0.5 }, scene);
                table.material = tableMat;
                new BABYLON.PhysicsAggregate(table, BABYLON.PhysicsShapeType.CYLINDER, { mass: 0, friction: 1 }, scene);

                const createPillar = (name, x, z) => {
                    const p = BABYLON.MeshBuilder.CreateCylinder(name, { diameter: 0.4, height: 1.5 }, scene);
                    p.position.set(x, 0.75, z);
                    new BABYLON.PhysicsAggregate(p, BABYLON.PhysicsShapeType.CYLINDER, { mass: 0 }, scene);
                };
                createPillar("p1", 0, 1); createPillar("p2", -2.5, 2); createPillar("p3", 2.5, 2);

                // 初始化 6 枚硬币
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const radius = 2 + Math.sin(i) * 1;
                    createCoin("coin_" + i, Math.cos(angle) * radius, Math.sin(angle) * radius);
                }

                // === 5. 交互逻辑（反向拉线箭头） ===
                const hl = new BABYLON.HighlightLayer("hl", scene);
                let isDragging = false;
                let dragLine = null;
                let arrowLine = null;

                scene.onPointerObservable.add((pointerInfo) => {
                    if (!conn || !conn.open) return;

                    const isMyTurn = (myRole === "HOST" && gameState.phase === "P1_TURN") ||
                        (myRole === "CLIENT" && gameState.phase === "P2_TURN");
                    if (!isMyTurn) return;

                    if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERDOWN) {
                        const hit = allCoins.find(c => c.mesh === pointerInfo.pickInfo.pickedMesh);
                        if (hit) {
                            gameState.activeCoin = hit;
                            hl.addMesh(hit.mesh, BABYLON.Color3.White());
                            isDragging = true;
                            camera.detachControl();
                        }
                    }

                    if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERMOVE && isDragging) {
                        const pick = scene.pick(scene.pointerX, scene.pointerY, m => m === table);
                        if (pick.hit) {
                            const start = gameState.activeCoin.mesh.position;
                            const pullDir = start.subtract(pick.pickedPoint);
                            const arrowEnd = start.add(pullDir);

                            if (dragLine) dragLine.dispose();
                            dragLine = BABYLON.MeshBuilder.CreateLines("l", { points: [start, pick.pickedPoint] }, scene);
                            arrowLine = drawArrow(start, arrowEnd, scene, arrowLine);
                        }
                    }

                    if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERUP && isDragging) {
                        const pick = scene.pick(scene.pointerX, scene.pointerY, m => m === table);
                        if (pick.hit) {
                            const force = gameState.activeCoin.mesh.position.subtract(pick.pickedPoint).scale(45);

                            gameState.activeCoin.aggregate.body.applyImpulse(force, gameState.activeCoin.mesh.position);
                            gameState.phase = "ANIMATING";

                            conn.send({
                                type: "flip_coin",
                                coinName: gameState.activeCoin.name,
                                force: { x: force.x, y: force.y, z: force.z }
                            });
                        }
                        if (dragLine) dragLine.dispose(); dragLine = null;
                        if (arrowLine) arrowLine.dispose(); arrowLine = null;
                        isDragging = false;
                        hl.removeAllMeshes();
                        camera.attachControl(canvas, true);
                    }
                });

                // === 6. 核心结算与权威物理高频发射 ===
                scene.onAfterRenderObservable.add(() => {
                    if (gameState.phase === "ANIMATING") {
                        const moving = allCoins.some(c => c.aggregate.body.getLinearVelocity().length() > 0.05);

                        if (moving && myRole === "HOST" && conn && conn.open) {
                            const syncPack = allCoins.map(c => ({
                                name: c.name,
                                pos: { x: c.mesh.position.x, y: c.mesh.position.y, z: c.mesh.position.z },
                                vel: { x: c.aggregate.body.getLinearVelocity().x, y: c.aggregate.body.getLinearVelocity().y, z: c.aggregate.body.getLinearVelocity().z }
                            }));
                            conn.send({ type: "pos_sync", coins: syncPack });
                        }

                        if (!moving && !gameState.isStable) {
                            if (myRole === "HOST") {
                                processTurnResult();
                            }
                            gameState.isStable = true;
                        } else if (moving) {
                            gameState.isStable = false;
                        }
                    }
                });

                // 掉落边缘出界检测
                scene.onBeforeRenderObservable.add(() => {
                    for (let i = allCoins.length - 1; i >= 0; i--) {
                        const c = allCoins[i];
                        if (c.mesh.position.y < -3) {
                            if (!gameState.coinsFallen.includes(c.name)) {
                                gameState.coinsFallen.push(c.name);
                            }
                            removeCoin(c);

                            if (myRole === "HOST" && allCoins.length < 3) {
                                setTimeout(() => {
                                    const coinName = "coin_" + Date.now();
                                    const rx = Math.random() * 4 - 2;
                                    const rz = Math.random() * 4 - 2;
                                    createCoin(coinName, rx, rz);
                                    if (conn && conn.open) {
                                        conn.send({ type: "spawn_coin", name: coinName, x: rx, z: rz });
                                    }
                                }, 1000);
                            }
                        }
                    }
                });

                engine.runRenderLoop(() => { scene.render(); });
            } catch (e) {
                screenLog("3D系统崩溃: " + e.message, "red");
            }
        }

        // ==========================================
        // 🛠️ 辅助功能函数库
        // ==========================================
        function createCoin(name, x, z) {
            const coin = BABYLON.MeshBuilder.CreateCylinder(name, { diameter: 0.6, height: 0.15 }, scene);
            coin.position.set(x, 1, z);
            coin.material = goldMat;

            const agg = new BABYLON.PhysicsAggregate(coin, BABYLON.PhysicsShapeType.CYLINDER, { mass: 2.0, friction: 1, restitution: 0.6 }, scene);

            agg.body.setCollisionCallbackEnabled(true);
            agg.body.getCollisionObservable().add((collisionEvent) => {
                if (gameState.phase === "ANIMATING" && gameState.activeCoin) {
                    const otherBody = collisionEvent.collidedAgainst.transformNode;
                    if (otherBody && otherBody.name && otherBody.name.includes("coin") && otherBody !== gameState.activeCoin.mesh) {
                        gameState.hitList.add(otherBody.name);
                    }
                }
            });

            const obj = { name, mesh: coin, aggregate: agg };
            allCoins.push(obj);
            return obj;
        }

        function removeCoin(coinObj) {
            if (!coinObj || !coinObj.mesh) return;
            if (coinObj.aggregate) coinObj.aggregate.dispose();
            coinObj.mesh.dispose();
            allCoins = allCoins.filter(c => c !== coinObj);
        }

        // 核心修复点：动态刷新左上角、右下角文本及当前回合绿光高亮染色
        const updateUI = () => {
            if (!localPlayerText || !remoteOpponentText) return;

            if (myRole === "HOST") {
                // 本端是 HOST (P1) -> 右下角显示自己，左上角显示对手
                localPlayerText.text = `YOU: P1 (PETER)  分数: ${gameState.p1Score}`;
                remoteOpponentText.text = `OPPONENT: P2 (BRIAN)  分数: ${gameState.p2Score}`;

                // 染色高亮逻辑：当前属于谁的 Turn，谁的文字就变绿
                localPlayerText.color = (gameState.currentPlayer === "P1") ? "#00FF00" : "white";
                remoteOpponentText.color = (gameState.currentPlayer === "P2") ? "#00FF00" : "white";
            } else if (myRole === "CLIENT") {
                // 本端是 CLIENT (P2) -> 右下角显示自己，左上角显示对手
                localPlayerText.text = `YOU: P2 (BRIAN)  分数: ${gameState.p2Score}`;
                remoteOpponentText.text = `OPPONENT: P1 (PETER)  分数: ${gameState.p1Score}`;

                // 染色高亮逻辑：当前属于谁的 Turn，谁的文字就变绿
                localPlayerText.color = (gameState.currentPlayer === "P2") ? "#00FF00" : "white";
                remoteOpponentText.color = (gameState.currentPlayer === "P1") ? "#00FF00" : "white";
            } else {
                // 未加入房间时的初始挂起状态显示
                localPlayerText.text = "P1 (PETER): 0";
                remoteOpponentText.text = "P2 (BRIAN): 0";
            }
        };

        const drawArrow = (start, end, scene, existing) => {
            const dir = end.subtract(start);
            if (dir.length() < 0.2) return existing;
            const pts = [start, end];
            const side = BABYLON.Vector3.Cross(dir.normalizeToNew(), BABYLON.Vector3.Up()).scale(0.2);
            pts.push(end.subtract(dir.scale(0.2)).add(side));
            pts.push(end);
            pts.push(end.subtract(dir.scale(0.2)).subtract(side));

            if (existing) return BABYLON.MeshBuilder.CreateLines(null, { points: pts, instance: existing });
            const l = BABYLON.MeshBuilder.CreateLines("arrow", { points: pts, updatable: true }, scene);
            l.color = new BABYLON.Color3(0, 0.5, 1);
            return l;
        };

        const tossCoin = () => {
            const isPeter = Math.random() > 0.5;
            const starter = isPeter ? "P1" : "P2";
            const msg = isPeter ? "PETER (P1) HEADS - START!" : "BRIAN (P2) TAILS - START!";

            gameState.currentPlayer = starter;
            infoText.text = msg;
            infoText.alpha = 1;

            if (conn && conn.open) {
                conn.send({ type: "toss_result", starter: starter, msg: msg });
            }

            setTimeout(() => {
                infoText.alpha = 0;
                gameState.phase = isPeter ? "P1_TURN" : "P2_TURN";
                updateUI();
            }, 2000);
        };

        const processTurnResult = () => {
            const hitCount = gameState.hitList.size;
            const fallenCount = gameState.coinsFallen.length;
            let changeTurn = true;
            let curSettleText = "";

            if (fallenCount > 0) {
                if (gameState.currentPlayer === "P1") gameState.p2Score += fallenCount;
                else gameState.p1Score += fallenCount;
                curSettleText = "FALLEN! " + fallenCount + " TO OPPONENT";
                changeTurn = true;
            }
            else if (hitCount === 1) {
                if (gameState.currentPlayer === "P1") gameState.p1Score++;
                else gameState.p2Score++;
                curSettleText = "PERFECT! SCORE +1";
                removeCoin(gameState.activeCoin);
                changeTurn = false;
            }
            else if (hitCount > 1) {
                if (gameState.currentPlayer === "P1") gameState.p2Score++;
                else gameState.p1Score++;
                curSettleText = "TOO MANY HITS! SCORE TO OPPONENT";
                removeCoin(gameState.activeCoin);
                changeTurn = true;
            }
            else {
                curSettleText = "MISSED EVERYTHING";
                changeTurn = true;
            }

            if (conn && conn.open) {
                conn.send({
                    type: "turn_settle",
                    p1Score: gameState.p1Score,
                    p2Score: gameState.p2Score,
                    infoText: curSettleText
                });
            }
            infoText.text = curSettleText;
            infoText.alpha = 1;
            updateUI();

            setTimeout(() => {
                infoText.alpha = 0;
                if (changeTurn) gameState.currentPlayer = (gameState.currentPlayer === "P1") ? "P2" : "P1";
                gameState.phase = (gameState.currentPlayer === "P1") ? "P1_TURN" : "P2_TURN";

                if (conn && conn.open) {
                    conn.send({
                        type: "turn_next",
                        nextPlayer: gameState.currentPlayer,
                        nextPhase: gameState.phase
                    });
                }

                gameState.hitList.clear();
                gameState.coinsFallen = [];
                gameState.activeCoin = null;
                updateUI();
            }, 1500);
        };

        if (typeof HavokPhysics === "function") {
            HavokPhysics().then((instance) => {
                havokInstance = instance;
                setTimeout(initGame, 100);
            }).catch(e => console.error("Havok 加载异常:", e));
        } else {
            console.error("未能正确获取全局 Havok 构造对象");
        }

        window.addEventListener("resize", () => { if (engine) engine.resize(); });
    </script>
</body>

</html>
